<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0F0F12" />
    <title>BBCode Lab</title>

     <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 120' fill='none'%3E%3Cpath d='M50 5 L93.3 30 V80 L50 105 L6.7 80 V30 L50 5Z' stroke='%23a855f7' stroke-width='6' fill='transparent'/%3E%3C/svg%3E">
    <!-- 1. Tailwind CSS compilado para producao -->
    <link rel="stylesheet" href="./BBCode Lab.tailwind.min.css">
    
    <!-- 2. Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&family=Kanit:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- 3. React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 4. Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

    <style>
      :root {
        --bg-dark: #0F0F12;
        --bg-panel: #131316;
        --bg-activity: #0B0B0D;
        --accent: #8B5CF6;
        --border: #27272A;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-dark);
        color: #e4e4e7; /* zinc-200 */
        overflow: hidden;
        margin: 0;
        padding: 0;
      }
      .font-mono {
        font-family: 'Fira Code', monospace;
      }
      .font-kanit {
        font-family: 'Kanit', sans-serif;
      }
      .font-poppins {
        font-family: 'Poppins', sans-serif;
      }
      
      /* Modern Slim Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
        background-color: var(--bg-dark);
      }
      ::-webkit-scrollbar-track {
        background-color: var(--bg-dark);
      }
      ::-webkit-scrollbar-thumb {
        background-color: #27272a;
        border-radius: 4px;
        border: 1px solid var(--bg-dark);
      }
      ::-webkit-scrollbar-thumb:hover {
        background-color: #3f3f46;
      }

      /* Selection Color */
      ::selection {
        background: rgba(139, 92, 246, 0.3);
        color: #fff;
      }

      /* Utilities */
      .custom-scrollbar {
        scrollbar-width: thin;
        scrollbar-color: #27272a #0F0F12;
      }
      .developer-link {
        position: relative;
      }
      .developer-tooltip {
        position: absolute;
        top: 50%;
        left: calc(100% + 10px);
        z-index: 50;
        width: max-content;
        max-width: 220px;
        padding: .5rem .65rem;
        border: 1px solid #8B5CF6;
        border-radius: .375rem;
        background: #18181b;
        box-shadow: 0 8px 24px rgba(0, 0, 0, .35);
        color: #e4e4e7;
        font: 600 11px/1.35 'Inter', sans-serif;
        opacity: 0;
        pointer-events: none;
        transform: translate(-8px, -50%) scale(.96);
        transition: opacity .18s ease, transform .18s ease;
        visibility: hidden;
      }
      .developer-link:hover .developer-tooltip,
      .developer-link:focus-visible .developer-tooltip {
        opacity: 1;
        transform: translate(0, -50%) scale(1);
        visibility: visible;
      }

      /* Ajustes exclusivos para telas de celular. */
      @media (max-width: 767px) {
        html, body, #root {
          width: 100%;
          height: 100%;
        }
        .app-shell {
          width: 100%;
          height: 100dvh;
          flex-direction: column;
        }
        .activity-bar {
          display: none;
        }
        .app-sidebar {
          width: 100%;
          height: 8.5rem;
          flex: 0 0 8.5rem;
          border-right: 0;
          border-bottom: 1px solid var(--border);
        }
        .app-sidebar > :first-child {
          display: none;
        }
        .app-sidebar .custom-scrollbar {
          padding: .25rem 0;
          overscroll-behavior: contain;
        }
        .app-main {
          width: 100%;
          min-height: 0;
        }
        .editor-header {
          padding-right: .875rem;
          padding-left: .875rem;
        }
        .editor-title {
          min-width: 0;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }
        .editor-category {
          flex-shrink: 0;
          font-size: .5625rem;
          letter-spacing: .06em;
        }
        .lesson-content {
          max-width: none;
          padding: 1.25rem 1rem 5rem;
        }
        .documentation-content {
          overflow-wrap: anywhere;
          text-align: left;
        }
        .lesson-content .p-6,
        .lesson-content .p-8 {
          padding: 1rem;
        }
        .lesson-content .mt-6.flex.gap-3 {
          flex-wrap: wrap;
        }
      }
    </style>
</head>
  <body>
    <div id="root"></div>

    <!-- MAIN SCRIPT -->
        <!-- Aplicacao React precompilada -->
    <script src="./BBCode Lab.app.js" defer></script>
  </body>
</html>
